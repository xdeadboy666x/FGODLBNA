name: FGO Login System

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "00 19,05,15 * * *"
    - cron: "20 22,08 * * *"
    - cron: "40 01,11 * * *"
  workflow_dispatch:
  
jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Set Time Zone
        run: sudo systemsetup -settimezone America/Mexico_City

      - name: Checkout Repository
        uses: actions/checkout@master

      - name: Install dependencies
        run: pip install -r requirements.txt --user

      - name: Run main script
        run: |
          python3 main.py
        env:
          userIds: ${{ secrets.GAME_USERIDS }}
          authKeys: ${{ secrets.GAME_AUTHKEYS }}
          secretKeys: ${{ secrets.GAME_SECRETKEYS }}
          UserAgent: ${{ secrets.GAME_USERAGENT }}
          fateRegion: ${{ secrets.GAME_REGION }}
          webhookDiscord: ${{ secrets.DISCORD_WEBHOOK }}
